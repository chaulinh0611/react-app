server {
    listen 80;
    server_name chiendev.id.vn www.chiendev.id.vn;

    if ($host = www.chiendev.id.vn) {
        return 301 $scheme://chiendev.id.vn$request_uri;
    }

    # Normalize base path
    location = / {
        return 301 /kanby/;
    }

    location = /kanby {
        return 301 /kanby/;
    }

    # Proxy API requests to backend service
    location ^~ /kanby/api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived connections (SSE/websocket-safe defaults)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    # Serve Vite build under /kanby/
    location /kanby/ {
        rewrite ^/kanby/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
